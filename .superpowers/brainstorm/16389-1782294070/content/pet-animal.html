<h2>选择你的交易宠物 🐾</h2>
<p class="subtitle">盈利时开心变胖，亏损时难受伤心，哪种动物更适合陪伴你交易？</p>

<div class="cards">
  <div class="card" data-choice="cat" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="font-size:80px;line-height:1;">🐱</div>
      <div style="margin-top:12px;display:flex;gap:4px;justify-content:center;">
        <span style="font-size:32px;">😿</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:32px;">😺</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:40px;">😸</span>
      </div>
    </div>
    <div class="card-body">
      <h3>猫咪</h3>
      <p>高冷傲娇，赚钱了假装不在乎但嘴角上扬，亏钱了就躲起来不理你</p>
    </div>
  </div>

  <div class="card" data-choice="dog" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="font-size:80px;line-height:1;">🐶</div>
      <div style="margin-top:12px;display:flex;gap:4px;justify-content:center;">
        <span style="font-size:32px;">🥺</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:32px;">🐕</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:40px;">🦮</span>
      </div>
    </div>
    <div class="card-body">
      <h3>狗狗</h3>
      <p>忠诚热情，赚钱了疯狂摇尾巴，亏钱了委屈巴巴求安慰</p>
    </div>
  </div>

  <div class="card" data-choice="rabbit" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="font-size:80px;line-height:1;">🐰</div>
      <div style="margin-top:12px;display:flex;gap:4px;justify-content:center;">
        <span style="font-size:32px;">😢</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:32px;">🐇</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:40px;">🐰</span>
      </div>
    </div>
    <div class="card-body">
      <h3>兔子</h3>
      <p>软萌可爱，赚钱了蹦蹦跳跳吃胡萝卜，亏钱了耳朵耷拉下来</p>
    </div>
  </div>

  <div class="card" data-choice="hamster" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="font-size:80px;line-height:1;">🐹</div>
      <div style="margin-top:12px;display:flex;gap:4px;justify-content:center;">
        <span style="font-size:32px;">😔</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:32px;">🐹</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:48px;">🐹</span>
      </div>
    </div>
    <div class="card-body">
      <h3>仓鼠</h3>
      <p>圆滚滚吃货，赚钱了疯狂囤瓜子变胖，亏钱了瘦成一道闪电</p>
