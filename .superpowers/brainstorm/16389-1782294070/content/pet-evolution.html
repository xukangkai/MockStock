<h2>仓鼠的变身方式 🐹</h2>
<p class="subtitle">根据当日盈亏变化，仓鼠怎么"胖瘦"和"升级"？</p>

<div class="cards">
  <div class="card" data-choice="size" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;">
        <span style="font-size:28px;">🐹</span>
        <span style="font-size:36px;">🐹</span>
        <span style="font-size:48px;">🐹</span>
        <span style="font-size:64px;">🐹</span>
        <span style="font-size:80px;">🐹</span>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 单纯变胖变瘦</h3>
      <p>赚钱变大变圆，亏钱变小变扁，直观简单</p>
    </div>
  </div>

  <div class="card" data-choice="outfit" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;">
        <span style="font-size:40px;">🐹</span>
        <span style="font-size:40px;">🐹🎩</span>
        <span style="font-size:40px;">🐹👔</span>
        <span style="font-size:40px;">🐹🏆</span>
        <span style="font-size:40px;">🐹👑</span>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 换装升级</h3>
      <p>累计盈利解锁装备（帽子、西装、皇冠…），胖瘦 + 装扮双重变化</p>
    </div>
  </div>

  <div class="card" data-choice="evolve" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;">
        <span style="font-size:32px;">🐹</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:40px;">🐹✨</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:52px;">🐹🔥</span>
        <span style="font-size:24px;">→</span>
        <span style="font-size:64px;">🐹💎</span>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 进化形态</h3>
      <p>仓鼠从普通 → 黄金 → 火焰 → 钻石，每个等级外观不同，累计盈利触发进化</p>
    </div>
  </div>

  <div class="card" data-choice="combo" onclick="toggleSelect(this)">
    <div class="card-image" style="text-align:center;padding:24px 0;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:8px;">
        <div style="text-align:center;">
          <div style="font-size:32px;">🐹</div>
          <div style="font-size:10px;color:#94a3b8;">瘦</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:40px;">🐹🎩</div>
          <div style="font-size:10px;color:#94a3b8;">胖+帽</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:48px;">🐹✨👔</div>
          <div style="font-size:10px;color:#94a3b8;">更胖+西装</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:60px;">🐹💎👑</div>
          <div style="font-size:10px;color:#94a3b8;">巨胖+皇冠</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>D. 全都要</h3>
      <p>胖瘦（当日盈亏）+ 进化等级（累计）+ 装备解锁，三层叠加最有趣</p>
    </div>
  </div>
</div>
